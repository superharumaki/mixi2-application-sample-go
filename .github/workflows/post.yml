name: Post Bot

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod tidy

      - name: Run Bot
        run: go run .
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}

          API_ADDRESS: application-api.mixi.social:443
          STREAM_ADDRESS: application-stream.mixi.social:443
          TOKEN_URL: https://application-auth.mixi.social/oauth2/token
